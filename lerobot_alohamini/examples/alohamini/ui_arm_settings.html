<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>PS4 Arms Settings — AlohaMini</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10;--bg1:#0c0f16;--bg2:#10141e;--bg3:#161c28;
  --border:#1c2333;--border2:#253040;
  --txt:#b8c4d8;--txt2:#68788f;--txt3:#3a4a60;
  --accent:#e8a020;--accentlo:#3a2a00;
  --blue:#3d8ef0;--bluelo:#0a1e3a;
  --green:#28c46a;--red:#e05050;--redlo:#1e0808;
  --mono:'JetBrains Mono',monospace;--ui:'Barlow Condensed',sans-serif;
}
body.light{
  --bg:#e8eaed;--bg1:#f0f2f4;--bg2:#e0e3e8;--bg3:#d4d8df;
  --border:#c0c6d0;--border2:#a8b0bc;
  --txt:#1e2530;--txt2:#4a5668;--txt3:#7a8898;
  --accent:#b87010;--accentlo:#f5e8d0;
  --blue:#1a5ec8;--bluelo:#dce8f8;
  --green:#167a40;--red:#c03030;--redlo:#f8dada;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--ui);font-size:14px}
.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;
  background:var(--bg1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
a.back{color:var(--blue);text-decoration:none;font-size:13px;font-weight:600}
h2{font-size:14px;font-weight:700;color:var(--txt);margin:0;letter-spacing:.3px}
.gp-name{font-size:11px;font-family:var(--mono);color:var(--txt2);margin-left:auto;
  padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg3)}
.theme-btn{cursor:pointer;font-size:15px;padding:2px 8px;border-radius:4px;
  border:1px solid var(--border);background:var(--bg2);color:var(--txt2);margin-left:4px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px}
@media(max-width:800px){.layout{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.card-title{font-size:10px;font-family:var(--mono);color:var(--txt3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between}
.reset-btn{font-size:11px;color:var(--red);cursor:pointer;background:none;
  border:1px solid var(--redlo);padding:2px 8px;border-radius:4px}
.reset-btn:hover{background:var(--redlo)}
.speed-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px;
  background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.speed-row label{font-size:11px;color:var(--txt2);min-width:70px;font-family:var(--mono)}
.speed-row input[type=range]{flex:1;accent-color:var(--blue)}
.speed-row .sv{min-width:36px;text-align:right;font-size:12px;font-family:var(--mono);color:var(--blue);font-weight:700}
.irow{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;
  margin-bottom:3px;transition:background .1s;cursor:default;border:1px solid transparent}
.irow:hover{background:var(--bg3)}
.irow.active{background:var(--bluelo)!important;border-color:var(--blue)!important}
.irow.listening{background:var(--accentlo)!important;border-color:var(--accent)!important;animation:blink .4s infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:.6}}
.idx-badge{min-width:32px;font-size:11px;font-weight:700;font-family:var(--mono);
  color:var(--txt3);text-align:center;padding:2px 4px;border-radius:4px;background:var(--bg3)}
.bar{width:90px;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative;flex-shrink:0;border:1px solid var(--border)}
.bar-fill{height:100%;background:var(--blue);transition:width .05s;position:absolute;left:50%;transform:translateX(-50%)}
.bar-fill.neg{background:var(--red)}
.bar-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--border2)}
.btn-dot{width:14px;height:14px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;transition:.1s}
.btn-dot.on{background:var(--blue);box-shadow:0 0 6px var(--blue)}
select.action-sel{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--txt);
  border-radius:4px;padding:3px 6px;font-size:11px;min-width:0;font-family:var(--ui)}
select.action-sel:focus{outline:none;border-color:var(--blue)}
.bind-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);
  background:var(--bg);color:var(--blue);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--ui)}
.bind-btn:hover{background:var(--bluelo);border-color:var(--blue)}
.bind-btn.listening{background:var(--accentlo);border-color:var(--accent);color:var(--accent)}
.val-txt{font-size:11px;font-family:var(--mono);color:var(--blue);min-width:40px;text-align:right}
.trig-row{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg3);
  border-radius:6px;border:1px solid var(--border);margin-bottom:6px;font-size:12px}
.trig-row label{color:var(--txt2);min-width:55px;font-family:var(--mono)}
.trig-row input[type=number]{width:52px;background:var(--bg);border:1px solid var(--border2);
  color:var(--txt);border-radius:4px;padding:3px 6px;font-size:12px;font-family:var(--mono)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}
.live-dot.off{background:var(--border2);box-shadow:none}
.no-gp{color:var(--txt3);font-size:13px;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="/">← Back</a>
  <h2>🕹️ PS4 / DualShock Arm Bindings</h2>
  <span class="live-dot" id="live-dot"></span>
  <span class="gp-name" id="gp-name">—</span>
  <span class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀</span>
</div>

<div class="layout">
  <!-- BUTTONS -->
  <div class="card">
    <div class="card-title">
      Buttons
      <button class="reset-btn" onclick="resetBindings()">Reset defaults</button>
    </div>

    <!-- Arm speed -->
    <div class="speed-row">
      <label>Arm speed</label>
      <input type="range" min="0.2" max="10" step="0.1" id="asp-range"
        oninput="document.getElementById('asp-val').textContent=parseFloat(this.value).toFixed(1);setArmSpeed(this.value)">
      <span class="sv" id="asp-val">2.0</span>
    </div>

    <div id="btn-list"><div class="no-gp">Waiting for PS4…</div></div>
  </div>

  <!-- AXES -->
  <div class="card">
    <div class="card-title">Axes</div>

    <!-- L2 / R2 axis indices -->
    <div class="trig-row">
      <label>L2 axis#</label>
      <input type="number" min="0" max="15" id="l2-idx" value="4"
        onchange="setTrigIdx('l2', this.value)">
      <label style="margin-left:8px">R2 axis#</label>
      <input type="number" min="0" max="15" id="r2-idx" value="5"
        onchange="setTrigIdx('r2', this.value)">
      <span style="font-size:10px;color:#4a6080;margin-left:6px">wrist_roll</span>
    </div>

    <div id="axis-list"><div class="no-gp">Waiting for PS4…</div></div>
  </div>
</div>

<script>
const BTN_ACTIONS = ['none','gripper_close','gripper_open','switch_left','switch_right',
  'switch_cycle','switch_both','speed_up','speed_down','home_arms'];
const AXIS_JOINTS = ['none','shoulder_pan','shoulder_lift','elbow_flex','wrist_flex','wrist_roll','gripper'];

let bindings = {axes:{}, buttons:{}, arm_speed:2.0, trigger_l2:4, trigger_r2:5};
let liveButtons = {}, liveAxes = {};
let listening = null;
let prevBtns = {};

async function loadBindings(){
  bindings = await(await fetch('/arm_bindings')).json();
  document.getElementById('asp-range').value = bindings.arm_speed ?? 2.0;
  document.getElementById('asp-val').textContent = (bindings.arm_speed ?? 2.0).toFixed(1);
  document.getElementById('l2-idx').value = bindings.trigger_l2 ?? 4;
  document.getElementById('r2-idx').value = bindings.trigger_r2 ?? 5;
}
async function saveBindings(){
  await fetch('/arm_bindings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bindings)});
}
async function resetBindings(){
  await fetch('/arm_bindings/reset',{method:'POST'});
  await loadBindings();
  renderButtons(); renderAxes();
}
function setArmSpeed(v){
  bindings.arm_speed = parseFloat(v);
  saveBindings();
}
function setTrigIdx(which, v){
  bindings[which==='l2'?'trigger_l2':'trigger_r2'] = parseInt(v);
  saveBindings();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderButtons(){
  const el = document.getElementById('btn-list');
  const keys = Object.keys(liveButtons).sort((a,b)=>+a-+b);
  if(!keys.length){el.innerHTML='<div class="no-gp">No buttons detected</div>';return;}
  el.innerHTML = keys.map(i=>{
    const cfg = bindings.buttons?.[i] || {action:'none'};
    const val = liveButtons[i] ? 1 : 0;
    const opts = BTN_ACTIONS.map(a=>`<option value="${a}"${a===cfg.action?' selected':''}>${a}</option>`).join('');
    return `<div class="irow${val?' active':''}" id="abrow_${i}">
      <span class="idx-badge">B${i}</span>
      <span class="btn-dot${val?' on':''}" id="abdot_${i}"></span>
      <select class="action-sel" onchange="setBtn('${i}',this.value)">${opts}</select>
      <button class="bind-btn" id="abbind_${i}" onclick="startBind('${i}')">Bind</button>
    </div>`;
  }).join('');
}

function renderAxes(){
  const el = document.getElementById('axis-list');
  const keys = Object.keys(liveAxes).sort((a,b)=>+a-+b);
  if(!keys.length){el.innerHTML='<div class="no-gp">No axes detected</div>';return;}
  el.innerHTML = keys.map(i=>{
    const cfg = bindings.axes?.[i] || {joint:'none',invert:false,deadzone:0.18};
    const v = liveAxes[i] ?? 0;
    const pct = Math.abs(v)*50;
    const opts = AXIS_JOINTS.map(a=>`<option value="${a}"${a===(cfg.joint||'none')?' selected':''}>${a}</option>`).join('');
    return `<div class="irow${Math.abs(v)>.05?' active':''}" id="aarow_${i}">
      <span class="idx-badge">A${i}</span>
      <div class="bar"><div class="bar-center"></div>
        <div id="aabar_${i}" class="bar-fill${v<0?' neg':''}" style="width:${pct}%"></div></div>
      <span class="val-txt" id="aaval_${i}">${v.toFixed(2)}</span>
      <select class="action-sel" onchange="setAxis('${i}',this.value)">${opts}</select>
      <label style="font-size:11px;color:#6a8aaa;display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" ${cfg.invert?'checked':''} onchange="setAxisInvert('${i}',this.checked)">inv</label>
    </div>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function setBtn(idx, action){
  if(!bindings.buttons) bindings.buttons={};
  if(!bindings.buttons[idx]) bindings.buttons[idx]={action:'none'};
  bindings.buttons[idx].action = action;
  saveBindings();
}
function setAxis(idx, joint){
  if(!bindings.axes) bindings.axes={};
  if(!bindings.axes[idx]) bindings.axes[idx]={joint:'none',invert:false,deadzone:0.18,scale:1.0};
  bindings.axes[idx].joint = joint;
  saveBindings();
}
function setAxisInvert(idx, val){
  if(!bindings.axes) bindings.axes={};
  if(!bindings.axes[idx]) bindings.axes[idx]={joint:'none',invert:false,deadzone:0.18,scale:1.0};
  bindings.axes[idx].invert = val;
  saveBindings();
}

// ── Bind by press ─────────────────────────────────────────────────────────────
function startBind(idx){
  if(listening){ stopListen(); return; }
  listening = {idx};
  const btn = document.getElementById(`abbind_${idx}`);
  if(btn){ btn.textContent='Press…'; btn.classList.add('listening'); }
  // highlight row
  const row = document.getElementById(`abrow_${idx}`);
  if(row) row.classList.add('listening');
}
function stopListen(){
  if(!listening) return;
  const btn = document.getElementById(`abbind_${listening.idx}`);
  if(btn){ btn.textContent='Bind'; btn.classList.remove('listening'); }
  const row = document.getElementById(`abrow_${listening.idx}`);
  if(row) row.classList.remove('listening');
  listening = null;
}
function detectBind(btns){
  if(!listening) return;
  for(const [i, v] of Object.entries(btns)){
    if(v && !prevBtns[i]){
      // Move binding from source to pressed button
      const srcCfg = bindings.buttons?.[listening.idx] || {action:'none'};
      if(!bindings.buttons) bindings.buttons={};
      bindings.buttons[String(i)] = {...srcCfg};
      bindings.buttons[String(listening.idx)] = {action:'none'};
      saveBindings();
      stopListen();
      renderButtons();
      break;
    }
  }
  prevBtns = {...btns};
}

// ── Poll ──────────────────────────────────────────────────────────────────────
let _rendered = false;
setInterval(async()=>{
  try{
    const d = await(await fetch('/status')).json();
    const dot = document.getElementById('live-dot');
    const agp = d.arm_gamepad || 'none';
    const connected = agp !== 'none';
    dot.className = 'live-dot' + (connected?'':' off');
    document.getElementById('gp-name').textContent = connected ? agp : 'PS4 not connected';

    const btns = d.arm_gamepad_buttons || {};
    const axes = d.arm_gamepad_axes || {};

    if(listening) detectBind(btns);

    const needRB = Object.keys(btns).length !== Object.keys(liveButtons).length;
    const needRA = Object.keys(axes).length !== Object.keys(liveAxes).length;
    liveButtons = btns; liveAxes = axes;

    if(needRB || !_rendered){ renderButtons(); _rendered=true; }
    if(needRA || !_rendered) renderAxes();

    // Live update buttons
    for(const [i, v] of Object.entries(btns)){
      const dot = document.getElementById(`abdot_${i}`);
      const row = document.getElementById(`abrow_${i}`);
      if(dot) dot.className = 'btn-dot'+(v?' on':'');
      if(row && !row.classList.contains('listening')) row.className='irow'+(v?' active':'');
    }
    // Live update axes
    for(const [i, v] of Object.entries(axes)){
      const bar = document.getElementById(`aabar_${i}`);
      const val = document.getElementById(`aaval_${i}`);
      const row = document.getElementById(`aarow_${i}`);
      const pct = Math.abs(+v)*50;
      if(bar){ bar.style.width=pct+'%'; bar.className='bar-fill'+(+v<0?' neg':''); }
      if(val) val.textContent=(+v).toFixed(2);
      if(row) row.className='irow'+(Math.abs(+v)>.05?' active':'');
    }
  }catch(e){}
}, 80);

loadBindings();
function toggleTheme(){
  const l=document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent=l?'🌙':'☀';
  localStorage.setItem('theme',l?'light':'dark');
}
document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('theme')==='light'){
    document.body.classList.add('light');
    const b=document.getElementById('theme-btn');if(b)b.textContent='🌙';
  }
});
</script>
</body>
</html>
