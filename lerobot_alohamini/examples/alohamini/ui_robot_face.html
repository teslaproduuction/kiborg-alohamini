<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>AlohaMini</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#050810;font-family:'Segoe UI',sans-serif;touch-action:manipulation}

/* ── Background ── */
#bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 60%, #0a1428 0%, #050810 70%)}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:float linear infinite}
@keyframes float{0%{transform:translateY(0) scale(1);opacity:.6}50%{opacity:.2}100%{transform:translateY(-100vh) scale(.3);opacity:0}}

/* ── Face container ── */
#face{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:0}

/* ── Eyes ── */
#eyes-wrap{display:flex;gap:60px;align-items:center;justify-content:center;margin-top:-20px}
.eye-outer{position:relative;width:160px;height:160px}
.eye-bg{fill:#020408;stroke:#1a3a6a;stroke-width:3}
.eye-glow{fill:none;stroke:#2060c0;stroke-width:2;opacity:.5;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;stroke-width:2}50%{opacity:.8;stroke-width:4}}
.iris{transition:transform .15s ease-out}
.pupil{transition:transform .15s ease-out}
.eyelid-top{fill:#050810;transform-origin:50% 0%;transition:transform .1s ease-out}
.eyelid-bot{fill:#050810;transform-origin:50% 100%;transition:transform .1s ease-out}
.eye-shine{opacity:.7;animation:shine 4s ease-in-out infinite}
@keyframes shine{0%,100%{opacity:.7}50%{opacity:.3}}
.eye-scan{fill:none;stroke-width:1.5;animation:scan 2.5s linear infinite;opacity:0;transition:opacity .5s}
@keyframes scan{0%{stroke-dashoffset:500}100%{stroke-dashoffset:0}}

/* ── Mouth ── */
#mouth-wrap{margin-top:14px;height:50px;display:flex;align-items:center;justify-content:center}
#mouth-svg{transition:d .4s ease}

/* ── Status row ── */
#status-row{position:absolute;top:14px;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:20}
.stat-chip{background:rgba(10,20,40,.7);border:1px solid #1a3060;border-radius:20px;padding:5px 14px;font-size:12px;color:#6090d0;display:flex;align-items:center;gap:6px}
.stat-chip span{color:#90c0ff;font-weight:600}
.dot-conn{width:8px;height:8px;border-radius:50%;background:#1a3060;transition:background .5s}
.dot-conn.ok{background:#3fb950;box-shadow:0 0 6px #3fb950}

/* ── Mood label ── */
#mood-label{position:absolute;top:50%;transform:translateY(calc(-50% - 110px));font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#2a4a80;pointer-events:none;transition:color .5s,opacity .5s;opacity:.8}

/* ── E-STOP ── */
#estop-wrap{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:20px;z-index:30}
#estop-btn{
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #ff4040, #8b0000);
  border:4px solid #ff2020;
  color:#fff;font-size:16px;font-weight:900;letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 0 30px #ff000060, 0 0 60px #ff000030, inset 0 -6px 15px rgba(0,0,0,.4);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .1s,box-shadow .1s;
  user-select:none;-webkit-user-select:none;
  position:relative;overflow:hidden;
}
#estop-btn::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(transparent 0deg, rgba(255,255,255,.08) 60deg, transparent 120deg);
  animation:spin 4s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#estop-btn:active{transform:scale(.92);box-shadow:0 0 10px #ff000060}
#estop-btn.active-stop{
  background:radial-gradient(circle at 40% 35%, #ff8080, #cc0000);
  animation:estop-pulse 0.4s ease-in-out infinite alternate;
}
@keyframes estop-pulse{from{box-shadow:0 0 30px #ff0000a0}to{box-shadow:0 0 60px #ff0000ff,0 0 100px #ff000060}}
#estop-text{font-size:13px;font-weight:900;letter-spacing:2px;line-height:1.2;text-align:center}
#estop-icon{font-size:28px;margin-bottom:4px}

.side-info{display:flex;flex-direction:column;gap:8px;color:#2a4a80;font-size:11px}
.side-info .val{color:#5080c0;font-weight:600}

/* ── Overlay text ── */
#overlay-msg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:28px;font-weight:900;letter-spacing:6px;color:#fff;
  text-shadow:0 0 20px currentColor;
  opacity:0;transition:opacity .4s;pointer-events:none;
  text-transform:uppercase;
}

/* ── Mood themes ── */
body.mood-idle    {--eye-color:#4080ff;--iris-color:#2050c0;--glow:#1a3a8a}
body.mood-active  {--eye-color:#40d0ff;--iris-color:#2090c0;--glow:#106080}
body.mood-recording{--eye-color:#ff4060;--iris-color:#c01030;--glow:#600010}
body.mood-ai      {--eye-color:#a040ff;--iris-color:#7020c0;--glow:#300060}
body.mood-estop   {--eye-color:#ff8080;--iris-color:#ff2020;--glow:#600000}
body.mood-sleep   {--eye-color:#203050;--iris-color:#102030;--glow:#102030}
</style>
</head>
<body class="mood-idle">

<div id="bg"></div>
<div id="face">
  <!-- Status top bar -->
  <div id="status-row">
    <div class="stat-chip">
      <div class="dot-conn" id="conn-dot"></div>
      <span id="stat-ip">—</span>
    </div>
    <div class="stat-chip">🌡 <span id="stat-temp">—</span>°C</div>
    <div class="stat-chip">⏱ <span id="stat-up">—</span></div>
    <div class="stat-chip" id="stat-time">00:00</div>
  </div>

  <!-- Mood label -->
  <div id="mood-label">STANDBY</div>

  <!-- Eyes -->
  <div id="eyes-wrap">
    <!-- LEFT EYE -->
    <div class="eye-outer" id="eye-L">
      <svg viewBox="0 0 160 160" width="160" height="160">
        <defs>
          <radialGradient id="irisGradL" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#6090ff"/>
            <stop offset="100%" stop-color="#102080"/>
          </radialGradient>
          <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#000"/>
            <stop offset="100%" stop-color="#050820"/>
          </radialGradient>
          <filter id="glow-eye">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="clipL"><ellipse cx="80" cy="80" rx="68" ry="68"/></clipPath>
        </defs>
        <!-- outer ring glow -->
        <ellipse cx="80" cy="80" rx="75" ry="75" fill="none" stroke="#1a3a6a" stroke-width="2" opacity=".4"/>
        <!-- eye white/bg -->
        <ellipse class="eye-bg" cx="80" cy="80" rx="68" ry="68" filter="url(#glow-eye)"/>
        <!-- scan ring (AI mode) -->
        <ellipse class="eye-scan" id="scan-L" cx="80" cy="80" rx="55" ry="55" stroke="#a040ff"
          stroke-dasharray="50 300" stroke-dashoffset="0"/>
        <!-- iris -->
        <g class="iris" id="iris-L" clip-path="url(#clipL)">
          <ellipse cx="80" cy="80" rx="45" ry="45" fill="url(#irisGradL)"/>
          <!-- iris detail rings -->
          <ellipse cx="80" cy="80" rx="45" ry="45" fill="none" stroke="#3060c0" stroke-width="1" opacity=".5"/>
          <ellipse cx="80" cy="80" rx="35" ry="35" fill="none" stroke="#4070d0" stroke-width=".5" opacity=".4"/>
          <!-- pupil -->
          <ellipse class="pupil" id="pupil-L" cx="80" cy="80" rx="22" ry="22" fill="url(#pupilGrad)"/>
          <!-- shine -->
          <ellipse class="eye-shine" cx="68" cy="68" rx="8" ry="5" fill="rgba(255,255,255,.6)" transform="rotate(-20,68,68)"/>
          <ellipse class="eye-shine" cx="88" cy="74" rx="4" ry="3" fill="rgba(255,255,255,.3)"/>
        </g>
        <!-- eyelid top -->
        <rect class="eyelid-top" id="lid-top-L" x="8" y="8" width="144" height="80" rx="4"/>
        <!-- eyelid bottom -->
        <rect class="eyelid-bot" id="lid-bot-L" x="8" y="80" width="144" height="80" rx="4"/>
        <!-- outer glow ring -->
        <ellipse class="eye-glow" cx="80" cy="80" rx="70" ry="70"/>
      </svg>
    </div>

    <!-- RIGHT EYE -->
    <div class="eye-outer" id="eye-R">
      <svg viewBox="0 0 160 160" width="160" height="160">
        <defs>
          <radialGradient id="irisGradR" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#6090ff"/>
            <stop offset="100%" stop-color="#102080"/>
          </radialGradient>
          <clipPath id="clipR"><ellipse cx="80" cy="80" rx="68" ry="68"/></clipPath>
        </defs>
        <ellipse cx="80" cy="80" rx="75" ry="75" fill="none" stroke="#1a3a6a" stroke-width="2" opacity=".4"/>
        <ellipse class="eye-bg" cx="80" cy="80" rx="68" ry="68" filter="url(#glow-eye)"/>
        <ellipse class="eye-scan" id="scan-R" cx="80" cy="80" rx="55" ry="55" stroke="#a040ff"
          stroke-dasharray="50 300" stroke-dashoffset="0"/>
        <g class="iris" id="iris-R" clip-path="url(#clipR)">
          <ellipse cx="80" cy="80" rx="45" ry="45" fill="url(#irisGradR)"/>
          <ellipse cx="80" cy="80" rx="45" ry="45" fill="none" stroke="#3060c0" stroke-width="1" opacity=".5"/>
          <ellipse cx="80" cy="80" rx="35" ry="35" fill="none" stroke="#4070d0" stroke-width=".5" opacity=".4"/>
          <ellipse class="pupil" id="pupil-R" cx="80" cy="80" rx="22" ry="22" fill="url(#pupilGrad)"/>
          <ellipse class="eye-shine" cx="68" cy="68" rx="8" ry="5" fill="rgba(255,255,255,.6)" transform="rotate(-20,68,68)"/>
          <ellipse class="eye-shine" cx="88" cy="74" rx="4" ry="3" fill="rgba(255,255,255,.3)"/>
        </g>
        <rect class="eyelid-top" id="lid-top-R" x="8" y="8" width="144" height="80" rx="4"/>
        <rect class="eyelid-bot" id="lid-bot-R" x="8" y="80" width="144" height="80" rx="4"/>
        <ellipse class="eye-glow" cx="80" cy="80" rx="70" ry="70"/>
      </svg>
    </div>
  </div>

  <!-- Mouth -->
  <div id="mouth-wrap">
    <svg id="mouth-svg" viewBox="0 0 200 60" width="200" height="60">
      <path id="mouth-path" d="M 30 20 Q 100 50 170 20" fill="none" stroke="#2a4a80" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- E-STOP + side info -->
  <div id="estop-wrap">
    <div class="side-info" style="text-align:right">
      <div>CPU <span class="val" id="load-val">—</span></div>
      <div>ZMQ <span class="val" id="zmq-val">—</span></div>
    </div>

    <button id="estop-btn" ontouchstart="handleEstop(event)" onclick="handleEstop(event)">
      <div id="estop-icon">⛔</div>
      <div id="estop-text">E-STOP</div>
    </button>

    <div class="side-info">
      <div id="time-big" style="font-size:22px;font-weight:700;color:#4070c0;letter-spacing:2px">00:00</div>
      <div style="font-size:10px;letter-spacing:1px" id="date-val">—</div>
    </div>
  </div>

  <div id="overlay-msg"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let mood = 'idle';
let lookX = 0, lookY = 0;  // -1..1
let blinking = false;
let estopActive = false;
let lastStatus = {};

// ── Iris colors per mood ──────────────────────────────────────────────────────
const MOOD_IRIS = {
  idle:      {outer:'#4878e8', inner:'#1a3898', glow:'#2050c0'},
  active:    {outer:'#30d8ff', inner:'#0880b0', glow:'#10a0d0'},
  recording: {outer:'#ff3060', inner:'#900020', glow:'#cc0030'},
  ai:        {outer:'#b040ff', inner:'#600090', glow:'#8020c0'},
  estop:     {outer:'#ff6060', inner:'#cc0000', glow:'#ff2020'},
  sleep:     {outer:'#203050', inner:'#101828', glow:'#102030'},
};
const MOOD_LABEL = {
  idle:'STANDBY', active:'MOVING', recording:'RECORDING', ai:'AI MODE',
  estop:'EMERGENCY STOP', sleep:'SLEEPING',
};
const MOUTH_CURVE = {
  idle:'M 30 30 Q 100 50 170 30',
  active:'M 30 20 Q 100 52 170 20',
  recording:'M 30 15 Q 100 55 170 15',
  ai:'M 40 25 Q 100 45 160 25',
  estop:'M 30 45 Q 100 20 170 45',
  sleep:'M 50 32 Q 100 36 150 32',
};

function setMood(m) {
  mood = m;
  document.body.className = 'mood-' + m;
  document.getElementById('mood-label').textContent = MOOD_LABEL[m] || m.toUpperCase();
  // iris color update
  const c = MOOD_IRIS[m] || MOOD_IRIS.idle;
  ['L','R'].forEach(s => {
    const grad = document.getElementById('irisGrad'+s);
    if (!grad) return;
    grad.children[0].setAttribute('stop-color', c.outer);
    grad.children[1].setAttribute('stop-color', c.inner);
  });
  document.querySelectorAll('.eye-glow').forEach(el => el.style.stroke = c.glow);
  document.querySelectorAll('.eye-scan').forEach(el => {
    el.style.opacity = m==='ai' ? '0.7' : '0';
    el.setAttribute('stroke', c.outer);
  });
  // mouth
  const mp = document.getElementById('mouth-path');
  if (mp) {
    mp.setAttribute('d', MOUTH_CURVE[m] || MOUTH_CURVE.idle);
    mp.style.stroke = c.glow;
  }
  // overlay
  if (m === 'estop') showOverlay('E-STOP', '#ff4040', 2000);
  if (m === 'recording') showOverlay('● REC', '#ff3060', 800);
}

// ── Pupil / iris movement ──────────────────────────────────────────────────────
function movePupils(x, y) {
  // x,y in -1..1, max offset 18px
  const MAX = 18;
  ['L','R'].forEach(s => {
    const iris = document.getElementById('iris-'+s);
    const pupil = document.getElementById('pupil-'+s);
    if (!iris) return;
    iris.setAttribute('transform',  `translate(${x*MAX*0.6},${y*MAX*0.6})`);
    pupil.setAttribute('transform', `translate(${x*MAX},${y*MAX})`);
  });
}

// ── Blink ─────────────────────────────────────────────────────────────────────
function blink(both=true) {
  if (blinking || mood==='estop') return;
  blinking = true;
  const sides = both ? ['L','R'] : [Math.random()<.5?'L':'R'];
  sides.forEach(s => {
    const tt = document.getElementById('lid-top-'+s);
    const tb = document.getElementById('lid-bot-'+s);
    if (!tt) return;
    tt.style.transform = 'scaleY(1.6)';
    tb.style.transform = 'scaleY(1.6)';
    setTimeout(() => { tt.style.transform=''; tb.style.transform=''; }, 120);
  });
  setTimeout(() => { blinking = false; }, 300);
}

function slowBlink() {
  if (blinking || mood==='estop') return;
  blinking = true;
  ['L','R'].forEach(s => {
    const tt = document.getElementById('lid-top-'+s);
    const tb = document.getElementById('lid-bot-'+s);
    if (!tt) return;
    tt.style.transition = 'transform 0.18s ease-in';
    tb.style.transition = 'transform 0.18s ease-in';
    tt.style.transform = 'scaleY(1.6)'; tb.style.transform = 'scaleY(1.6)';
    setTimeout(() => {
      tt.style.transition = 'transform 0.22s ease-out';
      tb.style.transition = 'transform 0.22s ease-out';
      tt.style.transform=''; tb.style.transform='';
    }, 180);
  });
  setTimeout(() => { blinking = false; }, 500);
}

function squint(level=0.6) {
  ['L','R'].forEach(s => {
    const tt = document.getElementById('lid-top-'+s);
    const tb = document.getElementById('lid-bot-'+s);
    if (!tt) return;
    tt.style.transform = `scaleY(${level})`;
    tb.style.transform = `scaleY(${level})`;
  });
}
function unsquint() {
  ['L','R'].forEach(s => {
    document.getElementById('lid-top-'+s)?.style && (document.getElementById('lid-top-'+s).style.transform = '');
    document.getElementById('lid-bot-'+s)?.style && (document.getElementById('lid-bot-'+s).style.transform = '');
  });
}

// ── Sleep / wake ──────────────────────────────────────────────────────────────
function closeEyes() {
  ['L','R'].forEach(s => {
    const tt = document.getElementById('lid-top-'+s);
    const tb = document.getElementById('lid-bot-'+s);
    if (!tt) return;
    tt.style.transition = 'transform 0.6s ease-in';
    tb.style.transition = 'transform 0.6s ease-in';
    tt.style.transform = 'scaleY(1.6)'; tb.style.transform = 'scaleY(1.6)';
  });
}
function openEyes() {
  ['L','R'].forEach(s => {
    const tt = document.getElementById('lid-top-'+s);
    const tb = document.getElementById('lid-bot-'+s);
    if (!tt) return;
    tt.style.transition = 'transform 0.4s ease-out';
    tb.style.transition = 'transform 0.4s ease-out';
    tt.style.transform = ''; tb.style.transform = '';
  });
}

// ── Overlay message ───────────────────────────────────────────────────────────
function showOverlay(msg, color='#fff', duration=1000) {
  const el = document.getElementById('overlay-msg');
  el.textContent = msg; el.style.color = color; el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, duration);
}

// ── Random behavior ───────────────────────────────────────────────────────────
let _blinkTimer, _lookTimer, _idleTimer;

function schedBlink() {
  clearTimeout(_blinkTimer);
  const delay = mood==='sleep' ? 8000+Math.random()*12000 : 2500+Math.random()*5000;
  _blinkTimer = setTimeout(() => {
    if (mood!=='estop') slowBlink();
    schedBlink();
  }, delay);
}

function schedLook() {
  clearTimeout(_lookTimer);
  const delay = 1500 + Math.random()*4000;
  _lookTimer = setTimeout(() => {
    if (mood==='idle' || mood==='active') {
      lookX = (Math.random()-0.5)*1.4;
      lookY = (Math.random()-0.5)*0.8;
      movePupils(lookX, lookY);
    } else if (mood==='sleep') {
      movePupils(0, 0.3);
    }
    schedLook();
  }, delay);
}

// Occasional squint / raised brow expressions
function schedIdle() {
  clearTimeout(_idleTimer);
  _idleTimer = setTimeout(() => {
    if (mood === 'idle') {
      const r = Math.random();
      if (r < 0.15) {
        // curious: look up
        lookX=0; lookY=-0.7; movePupils(0,-0.7);
        setTimeout(()=>{ lookX=0; lookY=0; movePupils(0,0); }, 1200);
      } else if (r < 0.25) {
        // suspicious squint
        squint(0.7); setTimeout(unsquint, 800);
      } else if (r < 0.35) {
        // double blink
        slowBlink(); setTimeout(slowBlink, 400);
      }
    }
    schedIdle();
  }, 4000 + Math.random()*8000);
}

schedBlink(); schedLook(); schedIdle();

// ── Particles background ──────────────────────────────────────────────────────
(function spawnParticles(){
  const bg = document.getElementById('bg');
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className='particle';
    const sz = 2+Math.random()*4;
    const x = Math.random()*100, dur = 8+Math.random()*20;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${x}%;bottom:-10px;
      background:rgba(${30+Math.random()*40},${80+Math.random()*60},${180+Math.random()*60},.4);
      animation-duration:${dur}s;animation-delay:-${Math.random()*dur}s`;
    bg.appendChild(p);
  }
})();

// ── E-STOP ────────────────────────────────────────────────────────────────────
function handleEstop(e) {
  e.preventDefault();
  const btn = document.getElementById('estop-btn');
  if (!estopActive) {
    estopActive = true;
    btn.classList.add('active-stop');
    document.getElementById('estop-icon').textContent = '🛑';
    setMood('estop');
    squint(0.3);
    fetch('/estop', {method:'POST'}).catch(()=>{});
    // auto-release UI after 5s (server keeps sending zeros for 5s)
    setTimeout(() => {
      estopActive = false;
      btn.classList.remove('active-stop');
      document.getElementById('estop-icon').textContent = '⛔';
      unsquint();
      setMood('idle');
    }, 5200);
  } else {
    // second tap = release
    estopActive = false;
    btn.classList.remove('active-stop');
    document.getElementById('estop-icon').textContent = '⛔';
    fetch('/estop_release', {method:'POST'}).catch(()=>{});
    unsquint();
    setMood('idle');
  }
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  const t = now.toTimeString().slice(0,5);
  document.getElementById('stat-time').textContent = t;
  document.getElementById('time-big').textContent  = t;
  document.getElementById('date-val').textContent  =
    now.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
}
updateClock(); setInterval(updateClock, 5000);

// ── Status poll ───────────────────────────────────────────────────────────────
function pollStatus(){
  fetch('/status').then(r=>r.json()).then(s=>{
    lastStatus = s;
    document.getElementById('stat-ip').textContent   = s.ip || '?';
    document.getElementById('stat-temp').textContent = s.temp!=null ? s.temp : '?';
    document.getElementById('stat-up').textContent   = s.uptime || '?';
    document.getElementById('load-val').textContent  = s.load != null ? s.load.toFixed(2) : '?';
    document.getElementById('zmq-val').textContent   = s.zmq ? 'OK' : '—';
    const dot = document.getElementById('conn-dot');
    dot.className = 'dot-conn' + (s.zmq ? ' ok' : '');
    // auto mood from status
    if (!estopActive) {
      if (s.estop) setMood('estop');
    }
  }).catch(()=>{
    document.getElementById('conn-dot').className = 'dot-conn';
  });
}
pollStatus(); setInterval(pollStatus, 3000);

// ── Wake animation on load ────────────────────────────────────────────────────
closeEyes();
setTimeout(() => {
  openEyes();
  setTimeout(() => { blink(true); setMood('idle'); }, 600);
}, 400);
</script>
</body>
</html>
