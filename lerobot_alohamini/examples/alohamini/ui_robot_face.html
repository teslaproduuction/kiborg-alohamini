<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AlohaMini</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}
canvas#bg{position:fixed;inset:0;z-index:0}

#ui{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:0;pointer-events:none}

/* Status bar */
#topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent)}
.chip{display:flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.5px;color:#4080c0}
.chip b{color:#80c0ff;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;background:#1a3060;transition:background .5s,box-shadow .5s}
.dot.ok{background:#00ff88;box-shadow:0 0 8px #00ff88}

/* Eyes */
#eyes{display:flex;gap:50px;align-items:center;justify-content:center;margin-top:-10px;pointer-events:none}
canvas.eye{border-radius:50%;display:block}

/* Brow SVG */
#brows{position:absolute;pointer-events:none;top:0;left:0;width:100%;height:100%}

/* Mood label */
#mood{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#204060;margin-top:6px;text-shadow:0 0 10px #2060a0;transition:color .5s;pointer-events:none}

/* Mouth */
#mouth{margin-top:8px;pointer-events:none}

/* Status bottom strip */
#bottombar{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;align-items:flex-end;justify-content:space-between;padding:12px 20px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent)}
.side-stat{display:flex;flex-direction:column;gap:5px;font-size:11px;color:#203050}
.side-stat b{color:#4080a0;font-size:13px;font-weight:700;letter-spacing:1px}

/* E-STOP */
#estop{pointer-events:all;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#ff5050 0%,#8b0000 65%,#400000 100%);border:3px solid #ff2020;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 25px #ff000080,0 0 50px #ff000030,inset 0 -4px 12px #00000060;transition:transform .08s,box-shadow .08s;user-select:none;position:relative;overflow:hidden}
#estop::after{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(transparent 0deg,rgba(255,255,255,.06) 60deg,transparent 120deg);animation:spin 5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#estop:active{transform:scale(.9)}
#estop.fired{animation:estop-pulse .35s ease-in-out infinite alternate;border-color:#ff6060}
@keyframes estop-pulse{from{box-shadow:0 0 25px #ff000090}to{box-shadow:0 0 60px #ff0000ff,0 0 100px #ff000050}}
#estop .ico{font-size:26px;pointer-events:none}
#estop .lbl{font-size:12px;font-weight:900;letter-spacing:2px;color:#fff;pointer-events:none;margin-top:2px}

/* Overlay */
#overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;letter-spacing:8px;color:#ff4040;text-shadow:0 0 30px currentColor;opacity:0;pointer-events:none;transition:opacity .3s}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="topbar">
  <div class="chip"><div class="dot" id="ndot"></div><b id="nip">—</b></div>
  <div class="chip">🌡 <b id="temp">—</b>°C</div>
  <div class="chip">⏱ <b id="upt">—</b></div>
  <div class="chip"><b id="clk">--:--</b></div>
</div>

<div id="ui">
  <div id="mood">STANDBY</div>
  <div id="eyes">
    <canvas class="eye" id="eL" width="190" height="190"></canvas>
    <canvas class="eye" id="eR" width="190" height="190"></canvas>
  </div>
  <div id="mouth">
    <svg viewBox="0 0 220 60" width="220" height="60">
      <path id="mpath" d="M 35 30 Q 110 50 185 30" fill="none" stroke="#1a4060" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div id="bottombar">
  <div class="side-stat">
    <span>CPU <b id="load">—</b></span>
    <span>ZMQ <b id="zmq">—</b></span>
  </div>
  <div id="estop" ontouchstart="doEstop(event)" onclick="doEstop(event)">
    <div class="ico">⛔</div>
    <div class="lbl">E-STOP</div>
  </div>
  <div class="side-stat" style="text-align:right">
    <span><b id="tbig">--:--</b></span>
    <span><b id="date" style="font-size:11px;color:#304060">—</b></span>
  </div>
</div>

<div id="overlay"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const W = 190, H = 190, CX = W/2, CY = H/2, R = 88;

// ─────────────────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────────────────
const S = {
  // eye look target (-1..1)
  tx:0, ty:0,
  // current look (lerped)
  lx:0, ly:0,
  // lid: 0=open, 1=closed
  lid:0,  // target
  lidL:0, lidR:0,  // current per eye
  // pupil scale 0.5..1.5
  pupilTarget:1, pupilL:1, pupilR:1,
  // brow raise: -1..1
  browL:0, browR:0, browLT:0, browRT:0,
  // mood: idle | active | recording | ai | estop | sleep
  mood:'idle',
  // hue base, slowly shifts
  hue:210,
  hueSpeed:0.04,
  // iris rotation
  irisRot:0,
  irisRotSpeed:0.3,
  // scan line
  scan:0,
  // glitch
  glitch:false,
  estop:false,
};

// mood palettes [hue, sat%, light%]
const MOOD_HUE = {
  idle:210, active:185, recording:355, ai:285, estop:0, sleep:220,
};
const MOOD_LABEL = {
  idle:'STANDBY', active:'MOVING', recording:'REC ●', ai:'AI MODE', estop:'EMERGENCY STOP', sleep:'...',
};
const MOUTH_D = {
  idle:'M 35 30 Q 110 52 185 30',
  active:'M 35 22 Q 110 54 185 22',
  recording:'M 35 18 Q 110 56 185 18',
  ai:'M 45 26 Q 110 46 175 26',
  estop:'M 35 48 Q 110 18 185 48',
  sleep:'M 55 32 Q 110 36 165 32',
};

// ─────────────────────────────────────────────────────────────────────────────
//  BACKGROUND CANVAS
// ─────────────────────────────────────────────────────────────────────────────
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let BW, BH;
function resizeBg(){ BW=bgC.width=window.innerWidth; BH=bgC.height=window.innerHeight; }
window.addEventListener('resize', resizeBg); resizeBg();

const PARTICLES = Array.from({length:40},()=>({
  x:Math.random(), y:Math.random()+1,
  vx:(Math.random()-.5)*.0003, vy:-(Math.random()*.0008+.0003),
  r:Math.random()*2+.5, a:Math.random()*.5+.1, hue:Math.random()*60+190,
}));

function drawBg(t){
  bgX.clearRect(0,0,BW,BH);
  // deep space gradient
  const g=bgX.createRadialGradient(BW*.5,BH*.55,0,BW*.5,BH*.55,BH*.8);
  const h = S.hue;
  g.addColorStop(0,`hsla(${h},60%,8%,1)`);
  g.addColorStop(.5,`hsla(${h+20},40%,4%,1)`);
  g.addColorStop(1,'#000');
  bgX.fillStyle=g; bgX.fillRect(0,0,BW,BH);

  // scan lines
  bgX.fillStyle='rgba(0,0,0,.06)';
  for(let y=0;y<BH;y+=3) bgX.fillRect(0,y,BW,1);

  // particles
  PARTICLES.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.y<-.02){p.y=1.05;p.x=Math.random();}
    if(p.x<0||p.x>1){p.vx*=-1;}
    bgX.beginPath();
    bgX.arc(p.x*BW,p.y*BH,p.r,0,Math.PI*2);
    bgX.fillStyle=`hsla(${p.hue},80%,70%,${p.a})`;
    bgX.fill();
  });

  // grid lines (subtle)
  bgX.strokeStyle=`hsla(${h},50%,30%,.04)`;
  bgX.lineWidth=1;
  for(let x=0;x<BW;x+=60){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,BH);bgX.stroke();}
  for(let y=0;y<BH;y+=60){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(BW,y);bgX.stroke();}
}

// ─────────────────────────────────────────────────────────────────────────────
//  EYE DRAWING
// ─────────────────────────────────────────────────────────────────────────────
const eL = document.getElementById('eL').getContext('2d');
const eR = document.getElementById('eR').getContext('2d');

function drawEye(ctx, lx, ly, lid, pupilS, hue, t, side, irisRot){
  ctx.clearRect(0,0,W,H);
  const cx=CX, cy=CY;

  // glow backdrop
  ctx.save();
  ctx.shadowBlur=30; ctx.shadowColor=`hsla(${hue},100%,60%,.6)`;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue},40%,5%,1)`; ctx.fill();
  ctx.restore();

  // outer ring
  ctx.save();
  ctx.shadowBlur=20; ctx.shadowColor=`hsla(${hue},100%,60%,.8)`;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=`hsla(${hue},90%,55%,.9)`; ctx.lineWidth=2.5; ctx.stroke();
  ctx.restore();

  // clip to circle
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R-1,0,Math.PI*2); ctx.clip();

  const ox = lx*22, oy = ly*22;

  // iris base
  const ig=ctx.createRadialGradient(cx+ox*.7,cy+oy*.7,0,cx+ox,cy+oy,55);
  ig.addColorStop(0,`hsla(${hue+20},100%,55%,.9)`);
  ig.addColorStop(.4,`hsla(${hue},80%,35%,.95)`);
  ig.addColorStop(1,`hsla(${hue-20},60%,15%,1)`);
  ctx.beginPath(); ctx.arc(cx+ox,cy+oy,55,0,Math.PI*2);
  ctx.fillStyle=ig; ctx.fill();

  // hex iris pattern (rotating)
  ctx.save();
  ctx.translate(cx+ox,cy+oy);
  ctx.rotate(irisRot*(side==='R'?-1:1));
  ctx.strokeStyle=`hsla(${hue+30},80%,65%,.25)`;
  ctx.lineWidth=.8;
  const HS=14;
  for(let row=-5;row<=5;row++){
    for(let col=-5;col<=5;col++){
      const hx=col*HS*1.73+(row%2)*HS*.87, hy=row*HS*1.5;
      if(Math.sqrt(hx*hx+hy*hy)>52) continue;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3-Math.PI/6;
        i===0?ctx.moveTo(hx+HS*Math.cos(a),hy+HS*Math.sin(a)):ctx.lineTo(hx+HS*Math.cos(a),hy+HS*Math.sin(a));
      }
      ctx.closePath(); ctx.stroke();
    }
  }
  ctx.restore();

  // iris rings
  ctx.save();
  ctx.shadowBlur=6; ctx.shadowColor=`hsla(${hue},100%,70%,.5)`;
  [42,30].forEach(r=>{
    ctx.beginPath(); ctx.arc(cx+ox,cy+oy,r,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${hue+10},90%,60%,.35)`; ctx.lineWidth=1; ctx.stroke();
  });
  ctx.restore();

  // scan line sweep across iris
  const scanY = cy+oy-55 + ((S.scan+t*.0008)%1)*110;
  const sg=ctx.createLinearGradient(0,scanY-4,0,scanY+4);
  sg.addColorStop(0,'transparent');
  sg.addColorStop(.5,`hsla(${hue},100%,80%,.5)`);
  sg.addColorStop(1,'transparent');
  ctx.save();
  ctx.beginPath(); ctx.arc(cx+ox,cy+oy,55,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=sg; ctx.fillRect(cx+ox-56,scanY-4,112,8);
  ctx.restore();

  // pupil
  const pr = 18 * pupilS;
  const pg=ctx.createRadialGradient(cx+ox,cy+oy,0,cx+ox,cy+oy,pr);
  pg.addColorStop(0,'#000');
  pg.addColorStop(.7,'#050815');
  pg.addColorStop(1,`hsla(${hue},60%,10%,.8)`);
  ctx.save();
  ctx.shadowBlur=10; ctx.shadowColor=`hsla(${hue},100%,40%,.4)`;
  ctx.beginPath(); ctx.arc(cx+ox,cy+oy,pr,0,Math.PI*2);
  ctx.fillStyle=pg; ctx.fill();
  ctx.restore();

  // glint/shine
  ctx.save();
  ctx.shadowBlur=4; ctx.shadowColor='rgba(255,255,255,.8)';
  ctx.beginPath(); ctx.ellipse(cx+ox-11,cy+oy-12,7,4.5,-0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.65)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+ox+9,cy+oy-8,2.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fill();
  ctx.restore();

  // lid (clip top+bottom)
  if(lid>0){
    const l=lid;
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,cy-R+(R+4)*l);       // top lid
    ctx.fillRect(0,cy+R-(R+4)*l,W,H);        // bottom lid
  }

  ctx.restore(); // unclip

  // glitch effect
  if(S.glitch && Math.random()<.4){
    const gy=Math.random()*H, gh=Math.random()*8+2;
    ctx.save();
    const id=ctx.getImageData(0,gy,W,gh);
    const off=(Math.random()-.5)*20;
    ctx.putImageData(id,off,gy);
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  BEHAVIORS
// ─────────────────────────────────────────────────────────────────────────────
let behaviorTimer=0, nextBehavior=2000;
const behaviors=[];

function sched(fn,delay){ behaviors.push({fn,at:performance.now()+delay}); }

function runBehaviors(now){
  for(let i=behaviors.length-1;i>=0;i--){
    if(now>=behaviors[i].at){ behaviors[i].fn(); behaviors.splice(i,1); }
  }
}

function lookAt(x,y,dur=400){ S.tx=x; S.ty=y; }
function lookReset(delay=0){ sched(()=>{S.tx=0;S.ty=0;},delay); }

const IDLE_FNS=[
  // look left/right
  ()=>{lookAt((Math.random()>.5?1:-1)*.75, (Math.random()-.5)*.4);lookReset(800+Math.random()*600);},
  // look up curious
  ()=>{lookAt((Math.random()-.5)*.3,-0.8);S.browLT=-.4;S.browRT=-.4;sched(()=>{S.browLT=0;S.browRT=0;lookReset()},1000);},
  // slow blink
  ()=>{S.lid=1;sched(()=>{S.lid=0;},200);},
  // wink
  ()=>{ const l=Math.random()>.5; if(l){S.lid=1;sched(()=>{S.lid=0;},120);}
    else{const saved=S.lidR;S.lidR=1;sched(()=>{S.lidR=saved;},120);}},
  // double blink
  ()=>{S.lid=1;sched(()=>{S.lid=0;sched(()=>{S.lid=1;sched(()=>{S.lid=0;},120)},200)},120);},
  // surprised wide
  ()=>{S.pupilTarget=1.6;S.browLT=.6;S.browRT=.6;lookAt(0,0);sched(()=>{S.pupilTarget=1;S.browLT=0;S.browRT=0;},900);},
  // side-eye skeptical
  ()=>{lookAt(.9,.1);S.lid=.45;sched(()=>{S.lid=0;lookReset();},1200);},
  // scan left-right fast
  ()=>{lookAt(-1,0);sched(()=>lookAt(1,0),250);sched(()=>lookAt(-1,0),500);sched(()=>lookAt(1,0),750);sched(()=>{lookAt(0,0);},1000);},
  // squint and look down
  ()=>{S.lid=.5;lookAt(0,.6);sched(()=>{S.lid=0;lookReset();},1400);},
  // pupil contract/expand
  ()=>{S.pupilTarget=.5;sched(()=>{S.pupilTarget=1.3;sched(()=>{S.pupilTarget=1;},500);},400);},
  // rainbow flash — hue jump
  ()=>{const orig=S.hue;S.hue=(S.hue+120)%360;sched(()=>{S.hue=orig;},600);},
  // look down at estop
  ()=>{lookAt(.6,.9);sched(()=>lookReset(),700);},
];

function doIdleBehavior(){
  if(S.estop||S.mood==='estop') return;
  const fn=IDLE_FNS[Math.floor(Math.random()*IDLE_FNS.length)];
  fn();
}

// ─────────────────────────────────────────────────────────────────────────────
//  MOOD
// ─────────────────────────────────────────────────────────────────────────────
function setMood(m){
  S.mood=m;
  S.hue=MOOD_HUE[m]??210;
  document.getElementById('mood').textContent=MOOD_LABEL[m]??m;
  document.getElementById('mpath').setAttribute('d',MOUTH_D[m]??MOUTH_D.idle);
  document.getElementById('mpath').style.stroke=`hsl(${S.hue},70%,35%)`;
  if(m==='recording'){S.irisRotSpeed=1.5; flash('● REC','#ff3060',600);}
  else if(m==='ai'){S.irisRotSpeed=.8; S.hueSpeed=.15;}
  else if(m==='estop'){S.irisRotSpeed=3; flash('E-STOP','#ff4040',3000);}
  else if(m==='sleep'){S.irisRotSpeed=.05; S.lid=.75;}
  else{S.irisRotSpeed=.3; S.hueSpeed=.04; if(m!=='estop')S.lid=0;}
}

// ─────────────────────────────────────────────────────────────────────────────
//  OVERLAY FLASH
// ─────────────────────────────────────────────────────────────────────────────
function flash(msg,color,dur){
  const o=document.getElementById('overlay');
  o.textContent=msg; o.style.color=color; o.style.opacity='1';
  setTimeout(()=>o.style.opacity='0',dur);
}

// ─────────────────────────────────────────────────────────────────────────────
//  E-STOP
// ─────────────────────────────────────────────────────────────────────────────
let estopFired=false;
function doEstop(e){
  e.preventDefault();
  const btn=document.getElementById('estop');
  if(!estopFired){
    estopFired=true;
    btn.classList.add('fired');
    btn.querySelector('.ico').textContent='🛑';
    setMood('estop');
    S.glitch=true;
    fetch('/estop',{method:'POST'}).catch(()=>{});
    setTimeout(()=>{
      estopFired=false; S.glitch=false;
      btn.classList.remove('fired');
      btn.querySelector('.ico').textContent='⛔';
      setMood('idle');
    },5200);
  } else {
    estopFired=false; S.glitch=false;
    btn.classList.remove('fired');
    btn.querySelector('.ico').textContent='⛔';
    fetch('/estop_release',{method:'POST'}).catch(()=>{});
    setMood('idle');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
let last=0;
const TARGET_FPS=20, FRAME_MS=1000/TARGET_FPS;
function lerp(a,b,t){return a+(b-a)*t;}

function loop(now){
  requestAnimationFrame(loop);
  if(now-last < FRAME_MS) return;
  const dt=Math.min(now-last,80); last=now;

  // hue drift
  if(S.mood==='ai') S.hue=(S.hue+S.hueSpeed*dt*.1)%360;
  else if(S.mood==='idle') S.hue=lerp(S.hue,MOOD_HUE.idle,.005*dt);

  // iris rotation
  S.irisRot+=S.irisRotSpeed*dt*.001;

  // scan
  S.scan=(S.scan+dt*.0005)%1;

  // lerp look
  const spd=0.12*dt*.5;
  S.lx=lerp(S.lx,S.tx,spd); S.ly=lerp(S.ly,S.ty,spd);

  // lerp lids (shared target)
  S.lidL=lerp(S.lidL,S.lid,spd); S.lidR=lerp(S.lidR,S.lid,spd);

  // lerp brows
  S.browL=lerp(S.browL,S.browLT,.1*dt*.08);
  S.browR=lerp(S.browR,S.browRT,.1*dt*.08);

  // lerp pupils
  S.pupilL=lerp(S.pupilL,S.pupilTarget,.08*dt*.08);
  S.pupilR=lerp(S.pupilR,S.pupilTarget,.08*dt*.08);

  // idle behavior trigger
  behaviorTimer+=dt;
  if(behaviorTimer>nextBehavior){
    behaviorTimer=0;
    nextBehavior=1200+Math.random()*3500;
    doIdleBehavior();
  }
  runBehaviors(now);

  // draw
  drawBg(now);
  drawEye(eL,S.lx,S.ly,S.lidL,S.pupilL,S.hue,now,'L',S.irisRot);
  drawEye(eR,S.lx,S.ly,S.lidR,S.pupilR,S.hue,now,'R',S.irisRot);
}

// ─────────────────────────────────────────────────────────────────────────────
//  CLOCK + STATUS
// ─────────────────────────────────────────────────────────────────────────────
function tick(){
  const n=new Date();
  const t=n.toTimeString().slice(0,5);
  document.getElementById('clk').textContent=t;
  document.getElementById('tbig').textContent=t;
  document.getElementById('date').textContent=n.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
}
tick(); setInterval(tick,10000);

setInterval(()=>{
  fetch('/status').then(r=>r.json()).then(s=>{
    document.getElementById('nip').textContent=s.ip??'—';
    document.getElementById('temp').textContent=s.temp??'—';
    document.getElementById('upt').textContent=s.uptime??'—';
    document.getElementById('load').textContent=s.load?.toFixed(2)??'—';
    document.getElementById('zmq').textContent=s.zmq?'ON':'—';
    const d=document.getElementById('ndot');
    d.className='dot'+(s.zmq?' ok':'');
    if(s.estop&&!estopFired) setMood('estop');
  }).catch(()=>{});
},3000);

// ─────────────────────────────────────────────────────────────────────────────
//  BOOT ANIMATION
// ─────────────────────────────────────────────────────────────────────────────
S.lid=1; S.pupilTarget=0;
sched(()=>{S.lid=0;S.pupilTarget=1;flash('ALOHA','#40c0ff',1200);setMood('idle');},700);

requestAnimationFrame(loop);
</script>
</body>
</html>
